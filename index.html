<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#02060a">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle,#0b2733,#02060a 70%);
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
.app{
  width:min(820px,94%);
  text-align:center;
}
h1{
  color:#ffe066;
  letter-spacing:12px;
  font-size:48px;
  text-shadow:0 0 22px #ffe066;
}
.sub{
  color:#8deaff;
  margin-bottom:25px;
}
.core{
  width:320px;
  height:320px;
  border-radius:50%;
  margin:20px auto;
  border:5px solid #36b7ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:900;
  cursor:pointer;
  user-select:none;
  touch-action:manipulation;
  box-shadow:0 0 55px #36b7ff,inset 0 0 65px #06384c;
  position:relative;
}
.core:before,.core:after{
  content:"";
  position:absolute;
  border-radius:50%;
  inset:-25px;
  border:2px dashed rgba(54,183,255,.35);
  animation:spin 10s linear infinite;
}
.core:after{
  inset:-50px;
  animation-duration:16s;
}
@keyframes spin{to{transform:rotate(360deg)}}

.listen{
  border-color:#00ff88;
  box-shadow:0 0 75px #00ff88,inset 0 0 80px #003d25;
}
.speak{
  border-color:#ffd84d;
  box-shadow:0 0 75px #ffd84d,inset 0 0 80px #4b3900;
}

.panel{
  margin-top:35px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  border-radius:24px;
  padding:18px;
}
.quick button{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  margin:5px;
  font-weight:900;
  cursor:pointer;
  touch-action:manipulation;
}
.yellow{background:#ffd84d;color:#111}
.blue{background:#124052;color:white}
.green{background:#116b3a;color:white}
.red{background:#9c2020;color:white}

.textbox{
  margin-top:12px;
  background:#071923;
  border-radius:15px;
  padding:15px;
  color:#bdefff;
}
.log{
  margin-top:12px;
  text-align:left;
  max-height:190px;
  overflow:auto;
  background:rgba(0,0,0,.25);
  border-radius:16px;
  padding:12px;
  color:#dff9ff;
  font-size:14px;
}
.small{
  color:#bdefff;
  font-size:14px;
}
@media(max-width:650px){
  h1{font-size:36px}
  .core{width:250px;height:250px}
}
</style>
</head>

<body>

<div class="app">
  <h1>JARVIS</h1>
  <div class="sub">Yuvarlağa dokun • konuş • bırak • Jarvis cevaplasın</div>

  <div id="core" class="core" onclick="startJarvis()">DOKUN</div>

  <div class="panel">
    <div class="quick">
      <button class="yellow" onclick="startJarvis()">🎤 Dinle</button>
      <button class="blue" onclick="morningMode()">☀️ Günaydın</button>
      <button class="blue" onclick="readPlan()">📅 Plan</button>
      <button class="blue" onclick="getWeather()">🌤️ Hava</button>
      <button class="green" onclick="dailyReport()">📊 Rapor</button>
      <button class="red" onclick="clearAll()">Sıfırla</button>
    </div>

    <div class="textbox">
      Komut örnekleri:<br>
      <span class="small">
      “benim adım Kerem” • “bugün antrenmanım saat 5 de” • “10 dakika sonra uyar” • “hava nasıl” • “not al ödev var”
      </span>
    </div>

    <div id="log" class="log">JARVIS hazır. Yuvarlağa dokun.</div>
  </div>
</div>

<script>
const core = document.getElementById("core");
const log = document.getElementById("log");

let reminders = JSON.parse(localStorage.getItem("jarvis_reminders") || "[]");
let notes = JSON.parse(localStorage.getItem("jarvis_notes") || "[]");
let profile = JSON.parse(localStorage.getItem("jarvis_profile") || "{}");

function save(){
  localStorage.setItem("jarvis_reminders", JSON.stringify(reminders));
  localStorage.setItem("jarvis_notes", JSON.stringify(notes));
  localStorage.setItem("jarvis_profile", JSON.stringify(profile));
}

function write(t){
  log.innerHTML = t + "<br><br>" + log.innerHTML;
}

function speak(text){
  speechSynthesis.cancel();

  core.className = "core speak";
  core.innerText = "KONUŞUYOR";

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "tr-TR";
  u.rate = 1;
  u.pitch = 1;

  u.onend = () => {
    core.className = "core";
    core.innerText = "DOKUN";
  };

  speechSynthesis.speak(u);
  write("JARVIS: " + text);
}

function startJarvis(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    speak("Bu tarayıcı sesli komutu desteklemiyor. Chrome veya Google uygulamasında dene.");
    return;
  }

  speechSynthesis.cancel();

  const rec = new SR();
  rec.lang = "tr-TR";
  rec.continuous = false;
  rec.interimResults = false;

  core.className = "core listen";
  core.innerText = "DİNLİYOR";

  rec.onresult = e => {
    const text = e.results[0][0].transcript;
    write("SEN: " + text);
    handle(text);
  };

  rec.onerror = () => {
    core.className = "core";
    core.innerText = "DOKUN";
    speak("Seni duyamadım efendim.");
  };

  rec.onend = () => {
    if(core.classList.contains("listen")){
      core.className = "core";
      core.innerText = "DOKUN";
    }
  };

  rec.start();
}

function handle(text){
  text = (text || "").toLowerCase().trim();
  if(!text){
    speak("Komut duyamadım efendim.");
    return;
  }

  if(text.includes("benim adım")){
    profile.name = text.split("benim adım")[1].trim();
    save();
    speak("Tanıştığımıza memnun oldum " + profile.name + ".");
    return;
  }

  if(text.includes("ben geldim") || text.includes("günaydın")){
    morningMode();
    return;
  }

  if(text.includes("hava")){
    getWeather();
    return;
  }

  if(text.includes("saat kaç")){
    const now = new Date();
    speak("Efendim saat " + now.getHours() + ":" + String(now.getMinutes()).padStart(2,"0"));
    return;
  }

  if(text.includes("not al")){
    const note = text.replace("not al","").trim() || "boş not";
    notes.push({text:note,time:Date.now()});
    save();
    speak("Not aldım efendim: " + note);
    return;
  }

  if(text.includes("notlarımı oku") || text.includes("notları oku")){
    if(!notes.length){
      speak("Kayıtlı not yok efendim.");
    }else{
      speak("Notlarınız: " + notes.map(n=>n.text).join(". "));
    }
    return;
  }

  if(text.includes("plan") || text.includes("hatırlatma")){
    readPlan();
    return;
  }

  if(text.includes("rapor")){
    dailyReport();
    return;
  }

  if(text.includes("youtube aç")){
    speak("YouTube açılıyor efendim.");
    window.open("https://youtube.com","_blank");
    return;
  }

  if(text.includes("google aç")){
    speak("Google açılıyor efendim.");
    window.open("https://google.com","_blank");
    return;
  }

  const afterMatch = text.match(/(\d+)\s*dakika\s*sonra/);
  if(afterMatch){
    const mins = parseInt(afterMatch[1]);
    let name = text.replace(/(\d+)\s*dakika\s*sonra/g,"").replace("beni","").replace("uyar","").trim();
    if(!name) name = "hatırlatma";

    reminders.push({
      text:name,
      time:Date.now() + mins * 60000,
      done:false
    });

    save();
    speak("Tamam efendim. " + mins + " dakika sonra uyaracağım.");
    return;
  }

  const hourMatch = text.match(/saat\s*(\d{1,2})([:.](\d{2}))?/);
  if(hourMatch){
    let hour = parseInt(hourMatch[1]);
    let minute = hourMatch[3] ? parseInt(hourMatch[3]) : 0;

    if(hour < 8 && !text.includes("sabah")) hour += 12;

    const target = new Date();
    target.setHours(hour, minute, 0, 0);
    if(target.getTime() < Date.now()) target.setDate(target.getDate() + 1);

    let name = text
      .replace(/bugün/g,"")
      .replace(/yarın/g,"")
      .replace(/benim/g,"")
      .replace(/var/g,"")
      .replace(/saat\s*\d{1,2}([:.]\d{2})?/g,"")
      .trim();

    if(!name) name = "hatırlatma";

    reminders.push({
      text:name,
      time:target.getTime(),
      done:false
    });

    save();
    speak("Tamam efendim. " + name + " için saat " + hour + ":" + String(minute).padStart(2,"0") + " hatırlatacağım.");
    return;
  }

  miniAI(text);
}

function miniAI(text){
  if(text.includes("nasılsın")){
    speak("Sistemlerim aktif efendim. Size yardımcı olmaya hazırım.");
  }else if(text.includes("ronaldo") && text.includes("messi")){
    speak("Net cevap istiyorsanız Ronaldo derim efendim.");
  }else if(text.includes("sıkıldım")){
    speak("Kısa bir oyun, müzik veya yürüyüş iyi gelebilir efendim.");
  }else if(text.includes("motivasyon")){
    speak("Bugün küçük bir adım bile seni hedefe yaklaştırır efendim.");
  }else{
    speak("Bunu tam anlayamadım efendim. Hava, saat, not ve hatırlatma komutlarını kullanabilirsiniz.");
  }
}

function morningMode(){
  const now = new Date();
  const name = profile.name || "efendim";

  const today = reminders.filter(r =>
    !r.done && new Date(r.time).toDateString() === new Date().toDateString()
  );

  let msg = "Günaydın " + name + ". Saat " + now.getHours() + ":" + String(now.getMinutes()).padStart(2,"0") + ". ";

  if(today.length){
    msg += "Bugünkü planınız: " + today.map(r=>{
      const d = new Date(r.time);
      return r.text + " saat " + d.getHours() + ":" + String(d.getMinutes()).padStart(2,"0");
    }).join(", ");
  }else{
    msg += "Bugün için kayıtlı plan yok.";
  }

  speak(msg);
}

function readPlan(){
  const active = reminders.filter(r=>!r.done);

  if(!active.length){
    speak("Aktif hatırlatma yok efendim.");
    return;
  }

  const msg = active.map(r=>{
    const d = new Date(r.time);
    return r.text + " saat " + d.getHours() + ":" + String(d.getMinutes()).padStart(2,"0");
  }).join(". ");

  speak("Aktif planlarınız: " + msg);
}

async function getWeather(){
  speak("Hava durumunu kontrol ediyorum efendim.");

  try{
    let lat = 40.195;
    let lon = 29.06;

    if(navigator.geolocation){
      await new Promise(resolve=>{
        navigator.geolocation.getCurrentPosition(pos=>{
          lat = pos.coords.latitude;
          lon = pos.coords.longitude;
          resolve();
        },()=>resolve(),{timeout:3000});
      });
    }

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const wind = Math.round(data.current.wind_speed_10m);
    const desc = weatherText(data.current.weather_code);

    speak("Efendim hava " + temp + " derece. Durum " + desc + ". Rüzgar saatte " + wind + " kilometre.");
  }catch(e){
    speak("Hava durumunu alamadım efendim.");
  }
}

function weatherText(code){
  if(code === 0) return "açık";
  if([1,2,3].includes(code)) return "parçalı bulutlu";
  if([45,48].includes(code)) return "sisli";
  if([51,53,55,61,63,65].includes(code)) return "yağmurlu";
  if([71,73,75,77].includes(code)) return "karlı";
  if([95,96,99].includes(code)) return "fırtınalı";
  return "normal";
}

function dailyReport(){
  const name = profile.name || "efendim";
  const active = reminders.filter(r=>!r.done).length;
  const noteCount = notes.length;
  speak(name + ", günlük raporunuz: " + active + " aktif plan, " + noteCount + " kayıtlı not var.");
}

function checkReminders(){
  const now = Date.now();

  reminders.forEach(r=>{
    if(!r.done && now >= r.time){
      r.done = true;
      save();

      const msg = "Efendim, " + r.text + " saati geldi.";
      speak(msg);

      if(Notification.permission === "granted"){
        new Notification("JARVIS", {body:msg});
      }
    }
  });
}

function clearAll(){
  if(confirm("Her şeyi silmek istiyor musun?")){
    reminders = [];
    notes = [];
    profile = {};
    save();
    speak("Tüm veriler silindi efendim.");
  }
}

if("Notification" in window){
  Notification.requestPermission();
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

setInterval(checkReminders,1000);
</script>

</body>
</html>
